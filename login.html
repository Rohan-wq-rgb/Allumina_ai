<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allumina AI – Login or Sign Up</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2 id="auth-title">Welcome back</h2>
                <p id="auth-subtitle">Sign in to continue</p>
            </div>
            <form id="auth-form">
                <input type="email" id="email" placeholder="Email address" required autocomplete="email">
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                <button type="submit" class="btn-primary" id="auth-submit-btn">Sign In</button>
            </form>
            <div class="auth-switch">
                <span id="switch-text">No account?</span>
                <a href="#" id="switch-link">Sign up</a>
            </div>
            <div id="auth-message" class="message"></div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
