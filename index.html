<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allumina AI Chat</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body class="chat-page">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1 class="logo-small">
                    <svg width="32" height="32" viewBox="0 0 120 120">
                        <circle cx="60" cy="60" r="55" fill="none" stroke="var(--primary)" stroke-width="4"/>
                        <text x="60" y="75" font-size="60" font-weight="bold" fill="var(--primary)" text-anchor="middle" font-family="Arial">A</text>
                    </svg>
                    Allumina
                </h1>
                <button id="new-chat-btn" class="btn-icon" title="New Chat">+</button>
            </div>
            <div class="chat-list" id="chat-list"></div>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn-secondary">Logout</button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <header class="chat-header">
                <button id="toggle-sidebar" class="btn-icon">☰</button>
                <h2 id="current-chat-title">New Chat</h2>
                <button id="dark-mode-toggle" class="btn-icon">🌓</button>
            </header>
            <div class="chat-messages" id="chat-messages">
                <!-- Empty state -->
                <div class="empty-state" id="empty-state">
                    <div class="empty-logo">
                        <svg width="100" height="100" viewBox="0 0 120 120">
                            <circle cx="60" cy="60" r="55" fill="none" stroke="var(--primary)" stroke-width="4"/>
                            <text x="60" y="75" font-size="60" font-weight="bold" fill="var(--primary)" text-anchor="middle" font-family="Arial">A</text>
                        </svg>
                        <h2>Allumina AI</h2>
                    </div>
                    <p class="empty-hint">Ask anything or try one of these prompts:</p>
                    <div class="prompt-suggestions">
                        <button class="prompt-chip">Explain quantum computing in simple terms</button>
                        <button class="prompt-chip">Write a Python script to sort a list</button>
                        <button class="prompt-chip">Create a weekly meal plan in table format</button>
                        <button class="prompt-chip">Translate 'Good morning' into Japanese</button>
                    </div>
                </div>
            </div>
            <div class="chat-input-area">
                <form id="message-form" enctype="multipart/form-data">
                    <div class="input-group">
                        <label for="file-upload" class="file-upload-label" title="Attach file">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                        </label>
                        <input type="file" id="file-upload" name="file" style="display:none">
                        <textarea id="message-input" placeholder="Type your message..." rows="1" required></textarea>
                        <button type="submit" class="btn-send" title="Send message">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
