<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allumina AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-small">Allumina AI</div>
                <button id="toggle-sidebar" class="btn-icon">☰</button>
            </div>
            <div class="chat-list" id="chat-list"></div>
            <div class="sidebar-footer">
                <button id="new-chat-btn" class="btn-primary">New Chat</button>
                <button id="logout-btn" class="btn-secondary">Logout</button>
            </div>
        </aside>

        <main class="chat-main">
            <header class="chat-header">
                <h2 id="current-chat-title">New Chat</h2>
                <button id="dark-mode-toggle" class="btn-icon">🌓</button>
            </header>

            <div class="chat-messages" id="chat-messages">
                <div class="empty-state" id="empty-state">
                    <div class="empty-logo">
                        <h2>Allumina AI</h2>
                    </div>
                    <p class="empty-hint">Start a conversation</p>
                    <div class="prompt-suggestions">
                        <button class="prompt-chip">Write a Python function</button>
                        <button class="prompt-chip">Explain machine learning</button>
                        <button class="prompt-chip">Help me with HTML</button>
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <form id="message-form">
                    <div class="input-group">
                        <label for="file-upload" class="file-upload-label">📎</label>
                        <input type="file" id="file-upload" name="file" style="display:none">
                        <textarea id="message-input" placeholder="Type your message..." rows="1" required></textarea>
                        <button type="submit" class="btn-send">➤</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
